<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#0d0d14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Glow orb left -->
  <circle cx="140" cy="315" r="260" fill="#2563eb" fill-opacity="0.07" filter="url(#glow)"/>
  <!-- Glow orb right -->
  <circle cx="1060" cy="315" r="220" fill="#7c3aed" fill-opacity="0.07" filter="url(#glow)"/>

  <!-- Logo box -->
  <rect x="90" y="195" width="64" height="64" rx="16" fill="#2563eb"/>
  <text x="122" y="238" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="30" fill="white" text-anchor="middle" dominant-baseline="auto">B</text>

  <!-- Brand name -->
  <text x="172" y="224" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="28" letter-spacing="4" fill="white">BAIKAL</text>
  <text x="173" y="248" font-family="Arial, sans-serif" font-weight="400" font-size="13" letter-spacing="6" fill="white" fill-opacity="0.35">SYSTEMS</text>

  <!-- Accent divider -->
  <rect x="90" y="288" width="240" height="3" rx="2" fill="url(#accent)"/>

  <!-- Main headline -->
  <text x="90" y="362" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="56" fill="white" letter-spacing="-1">AI 콘텐츠 플랫폼</text>

  <!-- Sub headline -->
  <text x="90" y="418" font-family="Arial, sans-serif" font-size="26" fill="white" fill-opacity="0.45" letter-spacing="0">AI 개발 인사이트 · 프로젝트 포트폴리오 · 기술 지식베이스</text>

  <!-- URL pill -->
  <rect x="90" y="468" width="288" height="42" rx="21" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <text x="234" y="494" font-family="Arial, sans-serif" font-size="18" fill="white" fill-opacity="0.55" text-anchor="middle" letter-spacing="1">www.baikalsys.kr</text>

  <!-- Bottom right decorative dots -->
  <circle cx="1050" cy="500" r="6" fill="#2563eb" fill-opacity="0.6"/>
  <circle cx="1075" cy="500" r="4" fill="#7c3aed" fill-opacity="0.4"/>
  <circle cx="1095" cy="500" r="3" fill="white" fill-opacity="0.15"/>
</svg>
