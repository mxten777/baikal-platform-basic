# Supabase 로컬 개발 설정
# 공식 문서: https://supabase.com/docs/guides/cli/config
# 이 파일은 `supabase init` 후 생성됩니다. 연결 전 project_id를 반드시 설정하세요.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# 개발용 사이트 URL (프로덕션은 Supabase 대시보드에서 별도 설정)
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://www.baikalsys.kr"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false          # 관리자만 사용 — 외부 회원가입 비활성화
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false   # 로컬 개발 시 이메일 확인 생략

[analytics]
enabled = false
